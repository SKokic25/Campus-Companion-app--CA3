<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Events</h1>
<nav>
    <div class="dropdown">
      <button class="dropbtn" aria-expanded="false">Menu ▾</button>
      <div class="dropdown-content" role="menu">
        <a href="index.html" role="menuitem">Home</a>
        <a href="timetable.html" role="menuitem">Timetable</a>
        <a href="grades.html" role="menuitem">Grades</a>
        <a href="events.html" role="menuitem">Events</a>
        <a href="lunch_menu.html" role="menuitem">Canteen Menu</a>
        <a href="library_services.html" role="menuitem">Library Services</a>
        <a href="#" class="logout" onclick="logout()">Logout</a>
      </div>
    </div>
  </nav>
</header>


<main>
  <h2>Upcoming Events</h2>

  <!-- ADD EVENT -->
  <div class="add-event">
    <input type="text" id="eventName" placeholder="Event name">
    <input type="date" id="eventDate">
    <button id="addEventBtn">Add Event</button>
  </div>

  <div class="events-container" id="eventsContainer">

    <div class="event-card">
      <h3>Math Exam</h3>
      <p class="event-date">April 10, 2026</p>

      <button class="btn">Add Reminder</button>
      <button class="delete-btn">Remove</button>
    </div>
    <div class="event-card">
      <h3>Careers Day<h3>
      <p class="event-date">April 20, 2026</p>
      <button class="btn">Add Reminder</button>
      <button class="delete-btn">Remove</button>
    </div>


    <div class="event-card">
      <h3>Basketball Match</h3>
      <p class="event-date">April 15, 2026</p>
      <button class="btn">Add Reminder</button>
      <button class="delete-btn">Remove</button>
    </div>

  </div>
</main>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const container = document.getElementById("eventsContainer");
  const addBtn = document.getElementById("addEventBtn");

  const savedEvents = JSON.parse(localStorage.getItem("events")) || [];
  savedEvents.forEach(event => renderEvent(event));

  addBtn.addEventListener("click", () => {
    const name = document.getElementById("eventName").value;
    const date = document.getElementById("eventDate").value;

    if (!name || !date) {
      alert("Please fill in both fields");
      return;
    }

    const event = { name, date };

    const events = JSON.parse(localStorage.getItem("events")) || [];
    events.push(event);
    localStorage.setItem("events", JSON.stringify(events));

    renderEvent(event);

    document.getElementById("eventName").value = "";
    document.getElementById("eventDate").value = "";
  });

  function renderEvent(event) {
    const card = document.createElement("div");
    card.classList.add("event-card");

    card.innerHTML = `
      <h3>${event.name}</h3>
      <p class="event-date">${event.date}</p>
      <button class="btn">Add Reminder</button>
      <button class="delete-btn">Remove</button>
    `;

    container.appendChild(card);
    attachEvents(card);
  }

  function attachEvents(card) {
    const reminderBtn = card.querySelector(".btn");
    const deleteBtn = card.querySelector(".delete-btn");

    reminderBtn.addEventListener("click", () => {
      if (reminderBtn.classList.contains("active")) {
        reminderBtn.classList.remove("active");
        reminderBtn.textContent = "Add Reminder";
        reminderBtn.style.backgroundColor = "";
        reminderBtn.style.color = "";
      } else {
        reminderBtn.classList.add("active");
        reminderBtn.textContent = "Reminder Set ✅";
        reminderBtn.style.backgroundColor = "#2f6f4e";
        reminderBtn.style.color = "#fff";
      }
    });

    deleteBtn.addEventListener("click", () => {
      const title = card.querySelector("h3").textContent;

      let events = JSON.parse(localStorage.getItem("events")) || [];

      events = events.filter(e => e.name !== title);

      localStorage.setItem("events", JSON.stringify(events));

      card.remove();
    });
  }

  document.querySelectorAll(".event-card").forEach(card => {
    attachEvents(card);
  });

});
</script>
 <footer>
    © 2026 Student Companion App
  </footer>
</body>
</html>
