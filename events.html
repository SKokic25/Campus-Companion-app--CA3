<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Events</h1>

  <nav>
    <div class="dropdown">
      <button class="dropbtn">Menu ▾</button>
      <div class="dropdown-content">
        <a href="index.html">Home</a>
        <a href="timetable.html">Timetable</a>
        <a href="grades.html">Grades</a>
        <a href="events.html">Events</a>
        <a href="lunch_menu.html">Canteen Menu</a>
        <a href="library_services.html">Library Services</a>
        <a href="#" onclick="logout()">Logout</a>
      </div>
    </div>
  </nav>
</header>

<main>

<h2>Upcoming Events</h2>

<div class="add-event">
  <input type="text" id="eventName" placeholder="Event name">
  <input type="date" id="eventDate">

  <select id="eventCategory">
    <option value="">Select category</option>
    <option value="academic">Academic</option>
    <option value="sports">Sports</option>
    <option value="social">Social</option>
  </select>

  <button id="addEventBtn">Add Event</button>
</div>

<div class="events-container" id="eventsContainer"></div>

<h2>Recommendations ⭐️</h2>

<button id="showRecBtn">Show Recommendations</button>

<select id="recType">
  <option value="">Choose type</option>
  <option value="academic">Academic</option>
  <option value="sports">Sports</option>
  <option value="social">Social</option>
</select>

<div id="recommended"></div>

</main>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const container = document.getElementById("eventsContainer");
  const recContainer = document.getElementById("recommended");

  const addBtn = document.getElementById("addEventBtn");
  const recBtn = document.getElementById("showRecBtn");

  const savedEvents = JSON.parse(localStorage.getItem("events")) || [];
  savedEvents.forEach(renderEvent);

  function saveRecommended(event) {
    const recs = JSON.parse(localStorage.getItem("recommendedEvents")) || [];

    const exists = recs.some(e => e.name === event.name && e.date === event.date);

    if (!exists) {
      recs.push(event);
      localStorage.setItem("recommendedEvents", JSON.stringify(recs));
    }
  }

  addBtn.addEventListener("click", () => {

    const name = document.getElementById("eventName").value;
    const date = document.getElementById("eventDate").value;
    const category = document.getElementById("eventCategory").value;

    if (!name || !date || !category) {
      alert("Fill all fields");
      return;
    }

    const event = { name, date, category };

    const events = JSON.parse(localStorage.getItem("events")) || [];
    events.push(event);
    localStorage.setItem("events", JSON.stringify(events));

    saveRecommended(event);

    renderEvent(event);

    document.getElementById("eventName").value = "";
    document.getElementById("eventDate").value = "";
    document.getElementById("eventCategory").value = "";
  });

  function renderEvent(event) {

    const card = document.createElement("div");
    card.classList.add("event-card");

    card.innerHTML = `
      <h3>${event.name}</h3>
      <p>${event.date}</p>
      <p>${event.category}</p>
      <button class="btn">Add Reminder</button>
      <button class="delete-btn">Remove</button>
    `;

    container.appendChild(card);

    const deleteBtn = card.querySelector(".delete-btn");
    const reminderBtn = card.querySelector(".btn");

    reminderBtn.addEventListener("click", () => {
      reminderBtn.classList.toggle("active");
      reminderBtn.textContent =
        reminderBtn.classList.contains("active")
          ? "Reminder Set ✅"
          : "Add Reminder";
    });

    deleteBtn.addEventListener("click", () => {

      let events = JSON.parse(localStorage.getItem("events")) || [];

      events = events.filter(e =>
        !(e.name === event.name && e.date === event.date)
      );

      localStorage.setItem("events", JSON.stringify(events));

      card.remove();
    });
  }

  recBtn.addEventListener("click", () => {

    const type = document.getElementById("recType").value;

    if (!type) {
      alert("Choose a category");
      return;
    }

    const recs = JSON.parse(localStorage.getItem("recommendedEvents")) || [];

    const filtered = recs.filter(e => e.category === type);

    recContainer.innerHTML = `<h3>Recommended for you ⭐️ (${type})</h3>`;

    if (filtered.length === 0) {
      recContainer.innerHTML += "<p>No recommendations yet.</p>";
      return;
    }

    filtered.forEach(event => {

      const div = document.createElement("div");
      div.classList.add("event-card");

      div.innerHTML = `
        <h3>${event.name}</h3>
        <p>${event.date}</p>
        <p>${event.category}</p>
        <button class="add-to-events">Add to Events</button>
        <button class="delete-rec">delete suggestion</button>
      `;

      recContainer.appendChild(div);

      // Add back to event 
      div.querySelector(".add-to-events").addEventListener("click", () => {

        const events = JSON.parse(localStorage.getItem("events")) || [];

        const exists = events.some(e =>
          e.name === event.name && e.date === event.date
        );

        if (!exists) {
          events.push(event);
          localStorage.setItem("events", JSON.stringify(events));
          renderEvent(event);
        }

      });

      // Delete suggestion
      div.querySelector(".delete-rec").addEventListener("click", () => {

        let recs = JSON.parse(localStorage.getItem("recommendedEvents")) || [];

        recs = recs.filter(e =>
          !(e.name === event.name && e.date === event.date)
        );

        localStorage.setItem("recommendedEvents", JSON.stringify(recs));

        div.remove();
      });

    });

  });

});
</script>

</body>
</html>
