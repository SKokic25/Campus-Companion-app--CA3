<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lunch Menu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>Student Companion App</h1>

  <nav>
    <div class="dropdown">
      <button class="dropbtn" aria-expanded="false">Menu ▾</button>

      <div class="dropdown-content" role="menu">
        <a href="index.html" role="menuitem" data-i18n="home">Home</a>
        <a href="timetable.html" role="menuitem" data-i18n="timetable">Timetable</a>
        <a href="grades.html" role="menuitem" data-i18n="grades">Grades</a>
        <a href="events.html" role="menuitem" data-i18n="events">Events</a>
        <a href="lunch_menu.html" role="menuitem" data-i18n="canteenMenu">Canteen Menu</a>
        <a href="library_services.html" role="menuitem" data-i18n="libraryServices">Library Services</a>
        <a href="Contact_Us.html" role="menuitem" data-i18n="ContactUs">Contact us</a>
        <a href="#" class="logout" onclick="logout()" data-i18n="logout">Logout</a>
      </div>
    </div>
  </nav>
</header>
<main>
  <h2 data-i18n="lunchMenu">Lunch Menu</h2>

  <section class="menu-item">
    <h3 data-i18n="mainCourse">Main Course</h3>
    <ul><li id="main" data-i18n="loading">Loading…</li></ul>
  </section>

  <section class="menu-item">
    <h3 data-i18n="vegetarianOption">Vegetarian Option</h3>
    <ul><li id="veg" data-i18n="loading">Loading…</li></ul>
  </section>

  <section class="menu-item">
    <h3 data-i18n="dessert">Dessert</h3>
    <ul><li id="dessert" data-i18n="loading">Loading…</li></ul>
  </section>

  <section class="menu-item">
    <h3 data-i18n="sides">Sides</h3>
    <ul id="sides"><li data-i18n="loading">Loading…</li></ul>
  </section>

  <section class="menu-item">
    <h3 data-i18n="drinks">Drinks</h3>
    <ul id="drinks"><li data-i18n="loading">Loading…</li></ul>
  </section>

  <section id="menu-error" style="color:#b00; margin-top:12px; display:none;"></section>
</main>

<footer>
  <p>© 2026 Student Companion App</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
<script src="script.js" defer></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const mainEl = document.getElementById('main');
  const vegEl = document.getElementById('veg');
  const dessertEl = document.getElementById('dessert');
  const sidesEl = document.getElementById('sides');
  const drinksEl = document.getElementById('drinks');
  const errorEl = document.getElementById('menu-error');

  function escapeHtml(str) {
    return String(str || '')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  const weekday = new Date().toLocaleDateString('en-US', { weekday: 'long' });

  fetch('menu.json')
    .then(res => {
      if (!res.ok) throw new Error('menu.json not found');
      return res.json();
    })
    .then(data => {
      const menu = data[weekday] || data['default'] || null;

      if (!menu) {
        errorEl.style.display = 'block';
        errorEl.textContent = 'No menu available for ' + weekday + '.';
        mainEl.textContent = '-';
        vegEl.textContent = '-';
        dessertEl.textContent = '-';
        sidesEl.innerHTML = '';
        drinksEl.innerHTML = '';
        return;
      }

      mainEl.textContent = escapeHtml(menu.main || '-');
      vegEl.textContent = escapeHtml(menu.veg || '-');
      dessertEl.textContent = escapeHtml(menu.dessert || '-');

      sidesEl.innerHTML = Array.isArray(menu.sides) && menu.sides.length
        ? menu.sides.map(s => `<li>${escapeHtml(s)}</li>`).join('')
        : '<li>-</li>';

      drinksEl.innerHTML = Array.isArray(menu.drinks) && menu.drinks.length
        ? menu.drinks.map(d => `<li>${escapeHtml(d)}</li>`).join('')
        : '<li>-</li>';
    })
    .catch(err => {
      console.error('Failed to load menu.json', err);
      errorEl.style.display = 'block';
      errorEl.textContent = 'Could not load menu. Check menu.json and run a local server.';
      mainEl.textContent = '-';
      vegEl.textContent = '-';
      dessertEl.textContent = '-';
      sidesEl.innerHTML = '';
      drinksEl.innerHTML = '';
    });
});
</script>

</body>
</html>
