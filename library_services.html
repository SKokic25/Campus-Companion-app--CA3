<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Services</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Library Services</h1>
  <nav>
    <div class="dropdown">
      <button class="dropbtn" aria-expanded="false">Menu ▾</button>
      <div class="dropdown-content" role="menu">
        <a href="index.html">Home</a>
        <a href="timetable.html">Timetable</a>
        <a href="grades.html">Grades</a>
        <a href="events.html">Events</a>
        <a href="#" class="logout" onclick="logout()">Logout</a>
      </div>
    </div>
  </nav>
</header>

<main>

  <section class="card">
    <h2>Check Book Availability</h2>
    <input type="text" id="bookSearch" placeholder="Enter book title...">
    <button onclick="searchBooks()">Search</button>
    <ul id="bookResults"></ul>
  </section>

  <section class="card">
    <h2>Your Borrowed Books</h2>
    <button onclick="loadLoans()">Load My Loans</button>
    <ul id="loanList"></ul>
  </section>

  <section class="card">
    <h2>Reserve Study Room</h2>
    <label>Date:</label>
    <input type="date" id="roomDate">

    <label>Time:</label>
    <input type="time" id="roomTime">

    <button onclick="reserveRoom()">Reserve</button>
    <p id="reservationStatus"></p>
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
<script src="script.js"></script>

</body>
</html>
