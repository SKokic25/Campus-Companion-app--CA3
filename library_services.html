<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Services</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Student Companion App</h1>

  <nav>
    <div class="dropdown">
      <button class="dropbtn" aria-expanded="false">Menu ▾</button>

      <div class="dropdown-content" role="menu">
        <a href="index.html" role="menuitem" data-i18n="home">Home</a>
        <a href="timetable.html" role="menuitem" data-i18n="timetable">Timetable</a>
        <a href="grades.html" role="menuitem" data-i18n="grades">Grades</a>
        <a href="events.html" role="menuitem" data-i18n="events">Events</a>
        <a href="lunch_menu.html" role="menuitem" data-i18n="canteenMenu">Canteen Menu</a>
        <a href="library_services.html" role="menuitem" data-i18n="libraryServices">Library Services</a>
        <a href="Contact_Us.html" role="menuitem" data-i18n="ContactUs">Contact us</a>
        <a href="#" class="logout" onclick="logout()" data-i18n="logout">Logout</a>
      </div>
    </div>
  </nav>
</header>

<main>

  <section class="card">
    <h2 data-i18n="checkBooks">Check Book Availability</h2>

    <input 
      type="text" 
      id="bookSearch" 
      placeholder="Enter book title..."
      data-i18n-placeholder="enterBook"
    >

    <button onclick="searchBooks()" data-i18n="search">Search</button>
    <ul id="bookResults"></ul>
  </section>

  <section class="card">
    <h2 data-i18n="borrowedBooks">Your Borrowed Books</h2>

    <button onclick="loadLoans()" data-i18n="loadLoans">Load My Loans</button>
    <ul id="loanList"></ul>
  </section>

  <section class="card">
    <h2 data-i18n="reserveRoom">Reserve Study Room</h2>

    <label data-i18n="date">Date:</label>
    <input type="date" id="roomDate">

    <label data-i18n="time">Time:</label>
    <input type="time" id="roomTime">

    <button onclick="reserveRoom()" data-i18n="reserve">Reserve</button>

    <p id="reservationStatus"></p>
  </section>

  <section class="card">
    <h3 data-i18n="yourReservations">Your Reservations</h3>
    <ul id="reservationList"></ul>
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
<script src="script.js" defer></script>

<footer>
  <p>© 2026 Student Companion</p>
</footer>
</body>
</html>
